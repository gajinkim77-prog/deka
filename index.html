<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>독일어 실력 진단 테스트 (20문항)</title>
    <style>
        :root { --de-black: #000000; --de-red: #FF0000; --de-gold: #FFCC00; --bg: #f8f9fa; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; width: 100%; max-width: 700px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 8px solid var(--de-black); }
        .progress-bar { height: 8px; background: #eee; border-radius: 4px; margin-bottom: 20px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--de-red); width: 0%; transition: 0.3s; }
        .q-header { display: flex; justify-content: space-between; color: #666; font-size: 0.9rem; margin-bottom: 10px; }
        .question { font-size: 1.3rem; font-weight: 700; margin-bottom: 25px; line-height: 1.5; }
        .options { display: grid; gap: 12px; }
        .opt-btn { padding: 15px; border: 2px solid #eee; border-radius: 10px; background: none; cursor: pointer; text-align: left; font-size: 1.1rem; transition: 0.2s; }
        .opt-btn:hover:not(:disabled) { border-color: var(--de-red); background: #fff5f5; }
        .correct { background-color: #d4edda !important; border-color: #28a745 !important; }
        .wrong { background-color: #f8d7da !important; border-color: #dc3545 !important; }
        #next-btn { width: 100%; margin-top: 30px; padding: 15px; background: var(--de-black); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; display: none; }
        .result-screen { display: none; text-align: center; }
        .score-circle { width: 150px; height: 150px; border: 10px solid var(--de-gold); border-radius: 50%; display: flex; items-center: center; justify-content: center; font-size: 2.5rem; font-weight: 800; margin: 20px auto; align-items: center; }
    </style>
</head>
<body>

<div class="container">
    <div id="quiz-ui">
        <div class="progress-bar"><div class="progress-fill" id="fill"></div></div>
        <div class="q-header">
            <span id="q-level">Level: A1</span>
            <span id="q-count">1 / 20</span>
        </div>
        <div class="question" id="q-text">질문을 불러오는 중...</div>
        <div class="options" id="opt-container"></div>
        <button id="next-btn">다음 문제로 이동</button>
    </div>

    <div class="result-screen" id="result-ui">
        <h2>테스트 결과</h2>
        <div class="score-circle" id="final-score">0 / 20</div>
        <h3 id="level-title">진단 결과: 분석 중...</h3>
        <p id="level-desc" style="line-height: 1.6; color: #444;"></p>
        <button onclick="location.reload()" style="margin-top: 20px; padding: 12px 25px; border-radius: 8px; cursor: pointer;">다시 테스트하기</button>
    </div>
</div>

<script>
const questions = [
    // A1
    { l: "A1", q: "Wie ______ 당신의 이름은 무엇인가요?", a: ["heißen Sie", "heißt du", "heißt Sie", "heiße du"], c: 0 },
    { l: "A1", q: "Ich ______ aus Korea.", a: ["kommst", "kommt", "komme", "kommen"], c: 2 },
    { l: "A1", q: "Das ist ______ Buch (neutrum).", a: ["ein", "eine", "einen", "einer"], c: 0 },
    { l: "A1", q: "Hast du ______ Bruder?", a: ["ein", "einen", "einem", "einer"], c: 1 },
    { l: "A1", q: "Wir ______ heute Abend Pizza.", a: ["essen", "esst", "isst", "esse"], c: 0 },
    // A2
    { l: "A2", q: "Gestern ______ ich lange gearbeitet.", a: ["bin", "war", "habe", "hatte"], c: 2 },
    { l: "A2", q: "Ich ______ nach Hause gegangen.", a: ["habe", "bin", "werde", "war"], c: 1 },
    { l: "A2", q: "Können Sie ______ bitte helfen?", a: ["ich", "mich", "mir", "meiner"], c: 2 },
    { l: "A2", q: "Das ist die Tasche ______ Mutter (feminin, 소유격).", a: ["der", "die", "den", "dem"], c: 0 },
    { l: "A2", q: "Ich muss das Licht ______.", a: ["ausmachen", "machen aus", "ausmacht", "auszumachen"], c: 0 },
    // B1
    { l: "B1", q: "Ich bin müde, ______ ich viel gelernt habe.", a: ["dass", "weil", "obwohl", "wenn"], c: 1 },
    { l: "B1", q: "Das Auto ______ repariert.", a: ["wird", "ist", "hat", "wurde"], c: 0 },
    { l: "B1", q: "Wenn ich Zeit ______, käme ich vorbei.", a: ["habe", "hatte", "hätte", "habe gehabt"], c: 2 },
    { l: "B1", q: "Er fragt, ______ du morgen kommst.", a: ["dass", "ob", "weil", "denn"], c: 1 },
    { l: "B1", q: "Ich interessiere mich ______ Politik.", a: ["über", "an", "auf", "für"], c: 3 },
    // B2
    { l: "B2", q: "Er ist krank. ______, geht er zur Arbeit.", a: ["Deshalb", "Trotzdem", "Außerdem", "Folglich"], c: 1 },
    { l: "B2", q: "Je mehr ich lerne, ______ besser werde ich.", a: ["umso", "desto", "더", "so"], c: 1 },
    { l: "B2", q: "Ich erinnere mich gerne ______ unseren Urlaub.", a: ["an", "auf", "über", "in"], c: 0 },
    { l: "B2", q: "Es ist wichtig, ______ die Umwelt zu schützen.", a: ["dass", "zu", "um", "전혀 없음"], c: 1 },
    { l: "B2", q: "Anstatt ______ (schlafen), lerne ich Deutsch.", a: ["schlafen", "zu schlafen", "geschlafen", "schläfst"], c: 1 }
];

let cur = 0, score = 0;
const qText = document.getElementById('q-text'), optCont = document.getElementById('opt-container'), 
      fill = document.getElementById('fill'), count = document.getElementById('q-count'),
      next = document.getElementById('next-btn'), qLevel = document.getElementById('q-level');

function load() {
    const data = questions[cur];
    qText.innerText = data.q;
    qLevel.innerText = `난이도: ${data.l}`;
    count.innerText = `${cur + 1} / ${questions.length}`;
    fill.style.width = `${((cur + 1) / questions.length) * 100}%`;
    optCont.innerHTML = '';
    data.a.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'opt-btn';
        btn.innerText = opt;
        btn.onclick = () => select(i, data.c);
        optCont.appendChild(btn);
    });
    next.style.display = 'none';
}

function select(idx, correct) {
    const btns = document.querySelectorAll('.opt-btn');
    btns.forEach((b, i) => {
        b.disabled = true;
        if(i === correct) b.classList.add('correct');
        else if(i === idx) b.classList.add('wrong');
    });
    if(idx === correct) score++;
    next.style.display = 'block';
}

next.onclick = () => {
    cur++;
    if(cur < questions.length) load();
    else finish();
};

function finish() {
    document.getElementById('quiz-ui').style.display = 'none';
    const resUi = document.getElementById('result-ui');
    resUi.style.display = 'block';
    document.getElementById('final-score').innerText = `${score} / 20`;
    
    let title = "", desc = "";
    if(score <= 5) { title = "Level: A1 입문"; desc = "독일어와 막 친해지기 시작했군요! 기초 동사 변화와 명사의 성을 먼저 익히는 것을 추천합니다."; }
    else if(score <= 10) { title = "Level: A2 기초"; desc = "과거형과 기본 격 변화를 이해하고 있습니다. 문장을 길게 만드는 접속사 연습을 더 해보세요!"; }
    else if(score <= 15) { title = "Level: B1 중급"; desc = "중급 수준의 문법을 잘 구사합니다. 수동태와 재귀동사, 관계대명사를 완벽히 내 것으로 만드세요."; }
    else { title = "Level: B2 이상 숙련"; desc = "복잡한 문장 구조도 막힘없이 이해하시네요! 이제는 고급 어휘와 관용어구 위주로 실력을 다듬으시면 됩니다."; }
    
    document.getElementById('level-title').innerText = title;
    document.getElementById('level-desc').innerText = desc;
}

load();
</script>
</body>
</html>
